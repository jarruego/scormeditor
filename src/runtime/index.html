<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso SCORM</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="print/print.css" media="print">
</head>
<body>
  <a class="me-skip" href="#me-content">Saltar al contenido</a>
  <div id="me-app" class="me-menu-hidden">
    <!-- Barra superior: ☰ a la izquierda, título centrado, Imprimir/Ayuda/Cerrar
         a la derecha. El resto de herramientas vive en el menú lateral
         (Glosario, Recursos) o en la barra inferior (Transcripción, audio,
         Pantalla completa) — ver app.js/buildMenu y el <footer> más abajo. -->
    <header class="me-topbar" role="banner">
      <button id="me-toggle-menu" class="me-icon-btn" aria-expanded="false" aria-controls="me-menu" title="Mostrar/ocultar menú (Alt+M)" aria-label="Mostrar u ocultar el menú"><span data-icon="menu" aria-hidden="true"></span></button>
      <div class="me-topbar-title">
        <span id="me-brand" class="me-brand">Curso</span>
        <span id="me-course-title" class="me-course-title"></span>
      </div>
      <div class="me-topbar-right">
        <button id="me-btn-print" class="me-icon-btn" title="Imprimir" aria-label="Imprimir"><span data-icon="printer" aria-hidden="true"></span></button>
        <button id="me-btn-help" class="me-icon-btn" title="Ayuda" aria-label="Ayuda"><span data-icon="help-circle" aria-hidden="true"></span></button>
        <!-- Cierra el curso: si está incompleto pide confirmación (progreso
             guardado); si no, finaliza la sesión SCORM directamente (ver
             requestExit en app.js, misma lógica que «Salir del curso»). -->
        <button id="me-btn-close" class="me-icon-btn" title="Cerrar" aria-label="Cerrar y finalizar el curso"><span data-icon="log-out" aria-hidden="true"></span></button>
      </div>
    </header>

    <div class="me-body">
      <!-- Menú lateral -->
      <nav id="me-menu" class="me-menu" aria-label="Índice del curso"></nav>

      <!-- Pestaña de plegado del índice (solo escritorio; en móvil queda el ☰) -->
      <button id="me-menu-tab" class="me-menu-tab" aria-expanded="false" aria-controls="me-menu"
        aria-label="Mostrar u ocultar el índice" title="Mostrar/ocultar índice (Alt+M)">
        <span class="me-menu-tab-arrow" data-icon="chevron-right" aria-hidden="true"></span>
      </button>

      <!-- Área principal -->
      <main id="me-content" class="me-content" tabindex="-1" aria-live="polite"></main>
    </div>

    <!-- Barra de herramientas / navegación: bloque centrado y acotado al ancho
         de la diapositiva (.me-toolbar-center, ver styles.css). Pantalla
         completa vive al final del bloque de audio pero en escritorio sale
         del flujo y queda pegada al borde derecho de toda la barra. -->
    <footer class="me-toolbar" role="contentinfo">
      <div class="me-toolbar-center">
        <!-- Opciones de audio: separadas de la navegación por un hueco propio
             (.me-toolbar-center > gap), no por un divisor visible. -->
        <div class="me-toolbar-audio">
          <button id="me-btn-transcript" class="me-icon-btn" title="Transcripción (Alt+T)" aria-label="Transcripción">
            <span data-icon="file-text" aria-hidden="true"></span></button>

          <!-- Reproductor de la narración de la pantalla: oculto por completo si
               la pantalla actual no tiene audio_src (ver refreshAudioPlayer en
               app.js). Play/pause independiente del icono de sonido: éste último
               es el mute/volumen (persistido entre pantallas y sesiones). -->
          <div id="me-audio-player" class="me-audio-player" hidden>
            <button id="me-btn-playpause" class="me-icon-btn" title="Reproducir" aria-label="Reproducir narración">
              <span data-icon="play" aria-hidden="true"></span></button>
            <div class="me-audio-seek">
              <input id="me-audio-seek" type="range" min="0" max="1000" value="0" step="1" aria-label="Progreso de la narración">
              <span id="me-audio-time" class="me-audio-time" aria-hidden="true">0:00 / 0:00</span>
            </div>
            <button id="me-btn-audio" class="me-icon-btn is-on" aria-pressed="true" aria-label="Silenciar narración"
              title="Activar o desactivar el sonido de la narración">
              <span data-icon="volume-on" aria-hidden="true"></span></button>
            <input id="me-audio-volume" class="me-volume-slider" type="range" min="0" max="1" step="0.05" value="1" aria-label="Volumen">
            <label class="me-rate" title="Velocidad de la narración">
              <span class="sr-only">Velocidad de la narración</span>
              <select id="me-audio-rate" aria-label="Velocidad de la narración">
                <option value="1">1×</option>
                <option value="1.25">1.25×</option>
                <option value="1.5">1.5×</option>
                <option value="2">2×</option>
              </select>
            </label>
          </div>
          <!-- Pantalla completa: al final del bloque de audio (oculto si el
               navegador/LMS no lo permite, ver app.js). En escritorio sale del
               flujo (position:absolute, ver styles.css) y queda pegada al
               borde derecho de toda la barra; en móvil vuelve al flujo normal
               y se queda al final de esta fila. -->
          <button id="me-btn-fullscreen" class="me-icon-btn" title="Pantalla completa" aria-label="Pantalla completa" hidden><span data-icon="maximize" aria-hidden="true"></span></button>
        </div>

        <div class="me-toolbar-nav">
          <button id="me-prev" class="me-btn me-primary me-nav-btn" aria-label="Pantalla anterior">
            <span data-icon="arrow-left" aria-hidden="true"></span><span class="me-nav-btn-label">Anterior</span></button>

          <div class="me-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Progreso del curso">
            <div id="me-progress-done" class="me-progress-done"></div>
            <div id="me-progress-bar" class="me-progress-bar"></div>
            <span id="me-position" class="me-position">0 / 0</span>
          </div>

          <button id="me-next" class="me-btn me-primary me-nav-btn" aria-label="Pantalla siguiente">
            <span class="me-nav-btn-label">Siguiente</span><span data-icon="arrow-right" aria-hidden="true"></span></button>
        </div>
      </div>
    </footer>
  </div>

  <!-- Modal genérico -->
  <div id="me-modal" class="me-modal" role="dialog" aria-modal="true" aria-labelledby="me-modal-title" hidden>
    <div class="me-modal-card">
      <div class="me-modal-head">
        <h2 class="me-modal-title" id="me-modal-title"></h2>
        <button class="me-modal-close me-icon-btn" aria-label="Cerrar">✕</button>
      </div>
      <div class="me-modal-body"></div>
    </div>
  </div>

  <script src="assets/js/scorm_api.js"></script>
  <script src="assets/js/accessibility.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/interactions.js"></script>
  <script src="assets/js/renderer.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
